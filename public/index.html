<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro de Maestros</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main>
      <h1>Registro de Maestros</h1>

      <form id="form">
        <input type="hidden" id="id">
        <label>Nombre<br><input id="nombre" required></label>
        <label>Email<br><input id="email" type="email" required></label>
        <label>Asignatura<br><input id="asignatura"></label>
        <button type="submit">Guardar</button>
        <button type="button" id="cancel" style="display:none">Cancelar</button>
      </form>

      <section>
        <h2>Lista de Maestros</h2>
        <table id="lista">
          <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Asignatura</th><th>Acciones</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
